---
# https://packit.dev/docs/configuration/

upstream_package_name: oci-delta
downstream_package_name: oci-delta

specfile_path: build/package/rpm/oci-delta.spec

upstream_tag_template: v{version}
copy_upstream_release_description: true

issue_repository: https://github.com/containers/oci-delta

files_to_sync:
  - src:
      - ".packit.yaml"
      - "build/package/rpm/oci-delta.spec"
      - "build/package/rpm/oci-delta-*-vendor.tar.bz2"
    dest: .

srpm_build_deps:
  - git
  - golang
  - go-vendor-tools
  - python3-tomlkit
  - askalono-cli
  - rpmdevtools

actions:
  post-modifications:
    # https://fedora.gitlab.io/sigs/go/go-vendor-tools/scenarios/#manual-update
    - |
      bash -xc '
      export GOTOOLCHAIN=auto
      export BASE_DIR=${PACKIT_UPSTREAM_REPO}/build/package/rpm
      export GO_VENDOR_TOOLS_CONFIG=${BASE_DIR}/go-vendor-tools.toml
      export SPEC_FILE=${BASE_DIR}/oci-delta.spec
      # Create source tarball from the PR source tree
      VERSION=$(grep -m1 "^Version:" ${SPEC_FILE} | awk "{print \$2}")
      cd ${PACKIT_UPSTREAM_REPO}
      git archive --prefix=oci-delta-${VERSION}/ HEAD | gzip > ${BASE_DIR}/oci-delta-${VERSION}.tar.gz
      go_vendor_archive create --config ${GO_VENDOR_TOOLS_CONFIG} ${SPEC_FILE}
      VENDOR_TAR=${BASE_DIR}/oci-delta-${VERSION}-vendor.tar.bz2
      TMPDIR=$(mktemp -d)
      tar xf ${VENDOR_TAR} -C ${TMPDIR}
      go_vendor_license \
        --config ${GO_VENDOR_TOOLS_CONFIG} \
        --path ${SPEC_FILE} \
        report \
        --verify-spec \
        > ${TMPDIR}/vendor/LICENSE-BREAKDOWN.txt
      tar cjf ${VENDOR_TAR} -C ${TMPDIR} vendor
      rm -rf ${TMPDIR}
      if [ -n "${PACKIT_DOWNSTREAM_REPO}" ]; then
        cp "${VENDOR_TAR}" "${PACKIT_DOWNSTREAM_REPO}"
      fi
      '

jobs:
  # Copr build on PRs — builds the RPM via Packit
  # Only Fedora >= 43 have golang >= 1.25.0
  - job: copr_build
    trigger: pull_request
    targets:
      - "fedora-latest-stable-x86_64"
      - "fedora-latest-stable-aarch64"
      - "fedora-latest-x86_64"
      - "fedora-latest-aarch64"
      - "fedora-rawhide-x86_64"
      - "fedora-rawhide-aarch64"

  # Propose downstream PRs to Fedora dist-git on new GitHub release
  - job: propose_downstream
    trigger: release
    dist_git_branches:
      - "fedora-development"
      - "fedora-latest-stable"

  # Koji build when Packit PRs are merged in dist-git
  - job: koji_build
    trigger: commit
    allowed_pr_authors:
      - packit
      - all_committers
    dist_git_branches:
      - "fedora-latest-stable"
      - "fedora-latest"
      - "fedora-rawhide"

  # Bodhi update after Koji build
  - job: bodhi_update
    trigger: commit
    allowed_builders:
      - packit
      - all_committers
    dist_git_branches:
      - "fedora-latest-stable"
      - "fedora-latest"
      - "fedora-rawhide"
